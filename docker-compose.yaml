services:
  db-1:
    image: postgres:15-alpine
    container_name: mytonprovider-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ton}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ton}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mytonprovider-backend
    ports:
      - "8080:9090"
    environment:
      - DB_HOST=db-1
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-ton}

      - SYSTEM_PORT=9090
      - SYSTEM_LOG_LEVEL=1
      - SYSTEM_STORE_HISTORY_DAYS=90

      - TON_MASTER_ADDRESS=UQB3d3d3d3d3d3d3d3d3d3d3d3d3d3d3d3d3d3d3d3d3d0x0
      - TON_CONFIG_URL=https://ton-blockchain.github.io/global.config.json
      - TON_BATCH_SIZE=100

      - METRICS_NAMESPACE=ton-storage
      - METRICS_SERVER_SUBSYSTEM=mtpo-server
      - METRICS_WORKERS_SUBSYSTEM=mtpo-workers
      - METRICS_DB_SUBSYSTEM=mtpo-db
    depends_on:
      db-1:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9090/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx-1:
    image: nginx:alpine
    container_name: mytonprovider-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-1
    networks:
      - app-network
    restart: unless-stopped

  prometheus-1:
    image: prom/prometheus:latest
    container_name: mytonprovider-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    depends_on:
      - backend-1
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
    name: mytonprovider-network

volumes:
  pgdata:
    name: mytonprovider-pgdata
  prometheus_data:
    name: prometheus_data
